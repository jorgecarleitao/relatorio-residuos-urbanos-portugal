name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
    tags:
      - '*'
  workflow_dispatch:

# Sets permissions for the workflow
permissions:
  contents: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
      
      - name: Install AsciiDoctor
        run: |
          gem install asciidoctor asciidoctor-pdf
      
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      
      - name: Build HTML documentation
        run: make html
      
      - name: Build PDF documentation
        run: make pdf
      
      - name: Upload PDF artifact
        uses: actions/upload-artifact@v7
        with:
          name: report-pdf
          path: ./build/relatorio.pdf
          retention-days: 90

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    
    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v5
        with:
          ref: gh-pages
          path: gh-pages
        continue-on-error: true
      
      - name: Initialize gh-pages if needed
        run: |
          if [ ! -d "gh-pages/.git" ]; then
            git clone --branch gh-pages https://github.com/${{ github.repository }}.git gh-pages || {
              mkdir -p gh-pages
              cd gh-pages
              git init
              git checkout -b gh-pages
            }
          fi
      
      - name: Checkout current commit
        uses: actions/checkout@v5
        with:
          path: source
      
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
      
      - name: Install AsciiDoctor
        run: gem install asciidoctor asciidoctor-pdf
      
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      
      - name: Build HTML
        run: |
          cd source
          make html
      
      - name: Deploy to gh-pages
        run: |
          cd gh-pages
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          if [[ "${{ github.ref }}" == refs/heads/main ]]; then
            # Deploy to main folder for main branch
            rm -rf main
            mkdir -p main
            cp -r ../source/build/* main/
            git add main/
            git commit -m "Deploy from main branch" || exit 0
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            # Deploy to version folder for tags
            VERSION="${GITHUB_REF#refs/tags/}"
            mkdir -p "$VERSION"
            cp -r ../source/build/* "$VERSION"/
            git add "$VERSION"/
            git commit -m "Deploy version $VERSION" || exit 0
          fi
          
          # Generate index page listing all versions
          cat > index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="pt">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Relatório de Análise do Sector de Gestão de Resíduos Urbanos</title>
            <style>
              body {
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
                max-width: 800px;
                margin: 60px auto;
                padding: 0 20px;
                line-height: 1.6;
                color: #333;
              }
              h1 { color: #2c3e50; margin-bottom: 10px; }
              .subtitle { color: #7f8c8d; margin-bottom: 40px; }
              .section { margin: 40px 0; }
              .section h2 { color: #34495e; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
              .version-list { list-style: none; padding: 0; }
              .version-list li { margin: 15px 0; }
              .version-list a {
                display: inline-block;
                padding: 12px 20px;
                background: #3498db;
                color: white;
                text-decoration: none;
                border-radius: 5px;
                transition: background 0.3s;
              }
              .version-list a:hover { background: #2980b9; }
              .version-list .dev { background: #e67e22; }
              .version-list .dev:hover { background: #d35400; }
              .badge { 
                font-size: 0.8em;
                padding: 3px 8px;
                border-radius: 3px;
                margin-left: 10px;
              }
              .badge.dev { background: #e67e22; color: white; }
              .badge.stable { background: #27ae60; color: white; }
            </style>
          </head>
          <body>
            <h1>Relatório de Análise Comparativa do Sector de Gestão de Resíduos Urbanos em Portugal</h1>
            <p class="subtitle">Análise de 10 sistemas multimunicipais de gestão de resíduos urbanos</p>
            
            <div class="section">
              <h2>Última Versão (Desenvolvimento)</h2>
              <ul class="version-list">
                <li>
                  <a href="main/" class="dev">📄 Versão Main (Latest)</a>
                  <span class="badge dev">DEV</span>
                </li>
              </ul>
              <p><em>Esta é a versão mais recente do relatório, atualizada automaticamente a cada commit no branch principal.</em></p>
            </div>
            
            <div class="section">
              <h2>Versões Estáveis</h2>
              <ul class="version-list">
          EOF
          
          # List all version directories (excluding main and hidden files)
          for dir in $(ls -d */ 2>/dev/null | grep -v '^main/' | sed 's/\///' | sort -V -r); do
            if [[ "$dir" != ".git" ]]; then
              echo "        <li><a href=\"$dir/\">📦 Versão $dir</a> <span class=\"badge stable\">STABLE</span></li>" >> index.html
            fi
          done
          
          cat >> index.html << 'EOF'
              </ul>
              <p><em>Versões estáveis correspondem a releases oficiais e não são modificadas após publicação.</em></p>
            </div>
            
            <div class="section">
              <h2>Sobre</h2>
              <p>Este relatório apresenta uma análise comparativa dos principais sistemas de gestão de resíduos urbanos em Portugal, incluindo indicadores financeiros, operacionais e de rentabilidade.</p>
              <p><a href="https://github.com/jorgecarleitao/relatorio-residuos-urbanos-portugal">Ver código fonte no GitHub</a></p>
            </div>
          </body>
          </html>
          EOF
          
          git add index.html
          git commit -m "Update index page" || exit 0
          
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git gh-pages

  release:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    
    steps:
      - name: Download PDF artifact
        uses: actions/download-artifact@v4
        with:
          name: report-pdf
      
      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: relatorio.pdf
          body: |
            Relatório de Análise Comparativa do Sector de Gestão de Resíduos Urbanos em Portugal
            
            📄 **Relatório PDF:** Descarregar abaixo
            🌐 **Todas as versões:** https://jorgecarleitao.github.io/relatorio-residuos-urbanos-portugal/
            🌐 **Esta versão (HTML):** https://jorgecarleitao.github.io/relatorio-residuos-urbanos-portugal/${{ steps.version.outputs.VERSION }}/
          draft: false
          prerelease: false
